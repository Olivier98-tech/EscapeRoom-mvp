<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎉 Missie Geslaagd</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="er-page er-finale">
    <h1>💥 DE AI IS VERNIETIGD!</h1>
    <p style="color:var(--amber);font-size:1.25rem">De mensheid is gered. De code is gekraakt. 🎉</p>
    <p id="final-time" style="color:var(--terminal);font-size:1.1rem"></p>

    <img class="er-img" src="assets/images/finale.png" alt="Vier jonge cyberagenten vieren de overwinning" style="max-width:min(100%,540px);border:2px solid var(--terminal)" />

    <div style="margin-top:2rem">
      <button class="er-btn er-btn-secondary" id="cheer-btn" type="button">🎆 Speel overwinningsmuziek</button>
      <a class="er-btn er-btn-secondary" href="index.html" style="margin-left:0.5rem">↺ Nieuwe missie</a>
    </div>
  </main>

  <audio id="fireworks" src="assets/audio/fireworks.mp3" preload="auto" loop></audio>

  <script src="js/firebase-config.js"></script>
  <script src="js/game.js"></script>
  <script>
    // Only reachable after finishing level 6
    if (!ER.isComplete(6)) {
      window.location.href = ER.isStarted() ? "levels/level1.html" : "index.html";
    } else {
      const rem = ER.remainingMs();
      const el = document.getElementById("final-time");
      if (rem !== null && rem > 0) {
        el.textContent = "⏱ Ontsnapt met nog " + ER.fmt(rem) + " op de klok!";
      } else if (rem !== null) {
        el.textContent = "⏱ Ontsnapt — al kostte het iets meer tijd dan gepland...";
      }

      const fw = document.getElementById("fireworks");
      document.getElementById("cheer-btn").addEventListener("click", () => {
        if (fw.paused) { fw.play().catch(() => {}); } else { fw.pause(); }
      });
      // Try autoplay too; if the browser blocks it, the button is the fallback.
      if (ER.soundOn()) fw.play().catch(() => {});
    }
  </script>
</body>
</html>
